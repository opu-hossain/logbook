{% extends "base.html" %}

{% block title %}Reset Password — Logbook{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center py-10">
    <div
        class="w-full max-w-md bg-gb-surface dark:bg-gb-dark-surface border border-gb-border dark:border-gb-dark-border rounded-lg p-8">

        <div class="mb-8 text-center">
            <a href="/" class="text-2xl font-bold text-gb-accent">Logbook</a>
            <h1 class="text-xl font-bold text-gb-text dark:text-gb-dark-text mt-2">Reset your password</h1>
            <p class="text-gb-muted dark:text-gb-dark-muted text-sm mt-1">Enter your email and we'll send you a reset
                link.</p>
        </div>

        <form method="post" class="flex flex-col gap-4">
            {% csrf_token %}
            <div class="flex flex-col gap-1.5">
                <label class="text-sm font-medium text-gb-text dark:text-gb-dark-text">Email</label>
                <input type="email" name="email" required
                    class="w-full px-3 py-2 text-sm rounded border border-gb-border dark:border-gb-dark-border bg-gb-surface dark:bg-gb-dark-surface text-gb-text dark:text-gb-dark-text focus:outline-none focus:border-gb-accent transition-colors" />
            </div>
            <button type="submit"
                class="w-full py-2.5 text-sm font-semibold rounded bg-gb-accent text-white hover:bg-gb-accent-hover transition-colors mt-2">Send
                Reset Link</button>
        </form>

        <p class="text-sm text-gb-muted dark:text-gb-dark-muted mt-6 text-center">
            Remember your password? <a href="{% url 'login' %}"
                class="text-gb-accent hover:text-gb-accent-hover transition-colors font-medium">Log in</a>
        </p>

    </div>
</div>
{% endblock %}
