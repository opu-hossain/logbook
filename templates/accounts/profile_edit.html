{% extends "base.html" %}

{% block title %}Edit Profile — Logbook{% endblock %}

{% block content %}
<div class="max-w-md mx-auto py-10">
    <div
        class="bg-gb-surface dark:bg-gb-dark-surface border border-gb-border dark:border-gb-dark-border rounded-lg p-8">

        <h1 class="text-xl font-bold text-gb-text dark:text-gb-dark-text mb-6">Edit Profile</h1>

        <form method="post" enctype="multipart/form-data" class="flex flex-col gap-4">
            {% csrf_token %}

            <div class="flex flex-col gap-1.5">
                <label class="text-sm font-medium text-gb-text dark:text-gb-dark-text">First Name</label>
                {{ form.first_name }}
            </div>

            <div class="flex flex-col gap-1.5">
                <label class="text-sm font-medium text-gb-text dark:text-gb-dark-text">Last Name</label>
                {{ form.last_name }}
            </div>

            <div class="flex flex-col gap-1.5">
                <label class="text-sm font-medium text-gb-text dark:text-gb-dark-text">Bio</label>
                {{ form.bio }}
            </div>

            <div class="flex flex-col gap-1.5">
                <label class="text-sm font-medium text-gb-text dark:text-gb-dark-text">Avatar</label>
                {% if request.user.avatar %}
                <img src="{{ request.user.avatar.url }}" class="w-12 h-12 rounded-full object-cover mb-2" />
                {% endif %}
                {{ form.avatar }}
            </div>

            <div class="flex gap-3 mt-2">
                <button type="submit"
                    class="flex-1 py-2.5 text-sm font-semibold rounded bg-gb-accent text-white hover:bg-gb-accent-hover transition-colors">Save
                    Changes</button>
                <a href="{% url 'profile' %}"
                    class="flex-1 py-2.5 text-sm font-semibold rounded border border-gb-border dark:border-gb-dark-border text-gb-muted dark:text-gb-dark-muted hover:border-gb-accent hover:text-gb-accent transition-colors text-center">Cancel</a>
            </div>

        </form>

    </div>
</div>
{% endblock %}
