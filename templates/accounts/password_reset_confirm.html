{% extends "base.html" %}

{% block title %}Set New Password — Logbook{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center py-10">
    <div
        class="w-full max-w-md bg-gb-surface dark:bg-gb-dark-surface border border-gb-border dark:border-gb-dark-border rounded-lg p-8">

        <div class="mb-8 text-center">
            <a href="/" class="text-2xl font-bold text-gb-accent">Logbook</a>
            <h1 class="text-xl font-bold text-gb-text dark:text-gb-dark-text mt-2">Set new password</h1>
            <p class="text-gb-muted dark:text-gb-dark-muted text-sm mt-1">Enter your new password below.</p>
        </div>

        <form method="post" class="flex flex-col gap-4">
            {% csrf_token %}
            <div class="flex flex-col gap-1.5">
                <label class="text-sm font-medium text-gb-text dark:text-gb-dark-text">New Password</label>
                <input type="password" name="new_password1" required
                    class="w-full px-3 py-2 text-sm rounded border border-gb-border dark:border-gb-dark-border bg-gb-surface dark:bg-gb-dark-surface text-gb-text dark:text-gb-dark-text focus:outline-none focus:border-gb-accent transition-colors" />
            </div>
            <div class="flex flex-col gap-1.5">
                <label class="text-sm font-medium text-gb-text dark:text-gb-dark-text">Confirm New Password</label>
                <input type="password" name="new_password2" required
                    class="w-full px-3 py-2 text-sm rounded border border-gb-border dark:border-gb-dark-border bg-gb-surface dark:bg-gb-dark-surface text-gb-text dark:text-gb-dark-text focus:outline-none focus:border-gb-accent transition-colors" />
                {% if form.errors %}
                <p class="text-xs text-gb-red">{{ form.errors.new_password2.0 }}</p>
                {% endif %}
            </div>
            <button type="submit"
                class="w-full py-2.5 text-sm font-semibold rounded bg-gb-accent text-white hover:bg-gb-accent-hover transition-colors mt-2">Set
                New Password</button>
        </form>

    </div>
</div>
{% endblock %}
