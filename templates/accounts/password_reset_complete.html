{% extends "base.html" %}

{% block title %}Password Reset Complete — Logbook{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center py-10">
    <div
        class="w-full max-w-md bg-gb-surface dark:bg-gb-dark-surface border border-gb-border dark:border-gb-dark-border rounded-lg p-8 text-center">
        <a href="/" class="text-2xl font-bold text-gb-accent">Logbook</a>
        <div class="mt-6 mb-4 text-gb-green text-4xl">✓</div>
        <h1 class="text-xl font-bold text-gb-text dark:text-gb-dark-text mb-2">Password reset complete</h1>
        <p class="text-gb-muted dark:text-gb-dark-muted text-sm">Your password has been set. You can now log in with
            your new password.</p>
        <a href="{% url 'login' %}"
            class="inline-block mt-6 px-6 py-2.5 text-sm font-semibold rounded bg-gb-accent text-white hover:bg-gb-accent-hover transition-colors">Log
            In</a>
    </div>
</div>
{% endblock %}
