{% extends "base.html" %}

{% block title %}Reset Link Sent — Logbook{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center py-10">
    <div
        class="w-full max-w-md bg-gb-surface dark:bg-gb-dark-surface border border-gb-border dark:border-gb-dark-border rounded-lg p-8 text-center">
        <a href="/" class="text-2xl font-bold text-gb-accent">Logbook</a>
        <div class="mt-6 mb-4 text-gb-green text-4xl">✓</div>
        <h1 class="text-xl font-bold text-gb-text dark:text-gb-dark-text mb-2">Check your email</h1>
        <p class="text-gb-muted dark:text-gb-dark-muted text-sm">We've sent a password reset link to your email address.
            Check your inbox and follow the instructions.</p>
        <a href="{% url 'login' %}"
            class="inline-block mt-6 text-sm text-gb-accent hover:text-gb-accent-hover transition-colors font-medium">Back
            to Login</a>
    </div>
</div>
{% endblock %}
