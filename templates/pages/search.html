{% extends "base.html" %}

{% block title %}Search — Logbook{% endblock %}

{% block content %}

<div class="mb-8 pb-6 border-b border-gb-border dark:border-gb-dark-border">
  <p class="font-log text-xs text-gb-muted dark:text-gb-dark-muted uppercase tracking-widest mb-3">~/logbook/search</p>
  <h1 class="text-3xl font-bold text-gb-text dark:text-gb-dark-text">Search</h1>
  <p class="text-gb-muted dark:text-gb-dark-muted mt-1 text-sm">Find posts by title or content.</p>
</div>

<div class="relative mb-10">
  <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gb-muted dark:text-gb-dark-muted pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z" />
  </svg>
  <input
    type="text"
    name="q"
    id="search-input"
    placeholder="Search posts…"
    value="{{ query }}"
    autofocus
    hx-get="/search/"
    hx-trigger="keyup changed delay:300ms"
    hx-target="#search-results"
    hx-swap="innerHTML"
    class="w-full pl-10 pr-4 py-3 text-sm rounded border border-gb-border dark:border-gb-dark-border bg-gb-surface dark:bg-gb-dark-surface text-gb-text dark:text-gb-dark-text focus:outline-none focus:border-gb-accent transition-colors"
  />
</div>

<div id="search-results">
  {% include "blog/search_results.html" %}
</div>

{% endblock %}
