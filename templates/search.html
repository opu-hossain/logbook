{% extends "base.html" %}

{% block title %}Search — Logbook{% endblock %}

{% block content %}

<div class="mb-8">
  <h1 class="text-3xl font-bold text-gb-text dark:text-gb-dark-text">Search</h1>
  <p class="text-gb-muted dark:text-gb-dark-muted mt-1 text-sm">Find posts by title or content.</p>
</div>

<input
  type="text"
  name="q"
  id="search-input"
  placeholder="Search posts..."
  value="{{ query }}"
  hx-get="/search/"
  hx-trigger="keyup changed delay:300ms"
  hx-target="#search-results"
  hx-swap="innerHTML"
  class="w-full px-4 py-2 mb-8 text-sm rounded border border-gb-border dark:border-gb-dark-border bg-gb-surface dark:bg-gb-dark-surface text-gb-text dark:text-gb-dark-text focus:outline-none focus:border-gb-accent transition-colors"
/>

<div id="search-results">
  {% include "partials/search_results.html" %}
</div>

{% endblock %}
