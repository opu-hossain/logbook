<!-- Main swap: show empty form again so user can comment again -->
{% include "partials/comment_form.html" %}

<!-- OOB swap: toast notification -->
<div id="toast-container" hx-swap-oob="beforeend">
    <div x-data="{ show: true }" x-init="setTimeout(() => show = false, 3000)" x-show="show"
        x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0 translate-y-2"
        x-transition:enter-end="opacity-100 translate-y-0" x-transition:leave="transition ease-in duration-200"
        x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0"
        class="px-4 py-3 rounded border border-gb-green text-gb-green bg-gb-surface dark:bg-gb-dark-surface text-sm font-medium shadow-lg">
        ✓ Comment submitted! Awaiting approval.
    </div>
</div>
