<div>
    <!-- Debug: Show query and count -->
    <p class="text-sm text-gray-500 mb-4">Found {{ results|length }} results for "{{ query }}"</p>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        {% for post in results %}
        {% include "partials/post_card.html" %}
        {% empty %}
        {% if query %}
        <p class="text-gb-muted dark:text-gb-dark-muted col-span-3">No posts found for "{{ query }}".</p>
        {% else %}
        <p class="text-gb-muted dark:text-gb-dark-muted col-span-3">Start typing to search posts.</p>
        {% endif %}
        {% endfor %}
    </div>
</div>
