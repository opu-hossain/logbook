<div id="toast-container" hx-swap-oob="beforeend">
    <div x-data="{ show: true }" x-init="setTimeout(() => show = false, 3000)" x-show="show"
        x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0 translate-y-2"
        x-transition:enter-end="opacity-100 translate-y-0" x-transition:leave="transition ease-in duration-200"
        x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0" class="px-4 py-3 rounded border text-sm font-medium shadow-lg
      {% if toast_type == 'success' %}border-gb-green text-gb-green bg-gb-surface dark:bg-gb-dark-surface
      {% elif toast_type == 'error' %}border-gb-red text-gb-red bg-gb-surface dark:bg-gb-dark-surface
      {% else %}border-gb-accent text-gb-accent bg-gb-surface dark:bg-gb-dark-surface{% endif %}">
        {{ toast_message }}
    </div>
</div>
