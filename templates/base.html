{% load static %}
<!DOCTYPE html>
<html lang="en" class="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Logbook: A minimalist engine for transforming repository markdown into beautiful, readable documentation." />
  
  <!-- Browser Theme Colors matching Gruvbox bg/dark-bg -->
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#fbf1c7" />
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#1d2021" />
  
  <title>{% block title %}Logbook — Documentation Engine{% endblock %}</title>
  
  <link rel="stylesheet" href="{% static 'css/output.css' %}">
  <link rel="alternate" type="application/rss+xml" title="Logbook RSS Feed" href="/feed/" />
  
  <style>
    [x-cloak] { display: none !important; }

    /* Self-hosted JetBrains Mono */
    @font-face { font-family: 'JetBrains Mono'; src: url("{% static 'fonts/JetBrainsMono-Regular.woff2' %}") format('woff2'); font-weight: 400; font-style: normal; font-display: swap; }
    @font-face { font-family: 'JetBrains Mono'; src: url("{% static 'fonts/JetBrainsMono-Medium.woff2' %}") format('woff2'); font-weight: 500; font-style: normal; font-display: swap; }
    @font-face { font-family: 'JetBrains Mono'; src: url("{% static 'fonts/JetBrainsMono-SemiBold.woff2' %}") format('woff2'); font-weight: 600; font-style: normal; font-display: swap; }
    @font-face { font-family: 'JetBrains Mono'; src: url("{% static 'fonts/JetBrainsMono-Bold.woff2' %}") format('woff2'); font-weight: 700; font-style: normal; font-display: swap; }
    .font-log { font-family: 'JetBrains Mono', ui-monospace, monospace; }

    /* Visible keyboard focus */
    a:focus-visible, button:focus-visible, input:focus-visible, textarea:focus-visible, select:focus-visible {
      outline: 2px solid var(--color-gb-accent, #458588);
      outline-offset: 2px;
    }
  </style>
</head>

<body class="bg-gb-bg text-gb-text dark:bg-gb-dark-bg dark:text-gb-dark-text min-h-screen flex flex-col transition-colors duration-200" x-data>

  <a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:top-3 focus:left-3 focus:z-[60] focus:px-4 focus:py-2 focus:rounded focus:bg-gb-accent focus:text-white focus:text-sm focus:font-medium">
    Skip to content
  </a>

  {% include "partials/navbar.html" %}

  <main id="main-content" class="mx-auto flex-1 w-full px-4 sm:px-6 lg:px-8 py-8 {% block main_class %}max-w-[1800px]{% endblock %}">
        {% block content %}{% endblock %}
  </main>

  {% include "partials/footer.html" %}

  <!-- Theme script: runs before paint to avoid flash -->
  <script>
    (function () {
      const saved = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (saved === 'dark' || (!saved && prefersDark)) {
        document.documentElement.classList.replace('light', 'dark');
      }
    })();
  </script>

  <!-- Dependencies -->
  <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <!-- Toast container -->
  <div id="toast-container" class="fixed bottom-6 right-6 z-50 flex flex-col gap-3" aria-live="polite"></div>
</body>
</html>
