{% load static %}
<!DOCTYPE html>
<html lang="en" class="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Logbook{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'css/output.css' %}">
</head>

<body
  class="bg-gb-bg text-gb-text dark:bg-gb-dark-bg dark:text-gb-dark-text min-h-screen flex flex-col transition-colors duration-200"
  x-data
>

  {% include "partials/navbar.html" %}

  <main class="flex-1 w-full max-w-4xl mx-auto px-4 py-8">
    {% block content %}{% endblock %}
  </main>

  {% include "partials/footer.html" %}

  <!-- Theme script: runs before paint to avoid flash -->
  <script>
    (function () {
      const saved = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (saved === 'dark' || (!saved && prefersDark)) {
        document.documentElement.classList.replace('light', 'dark');
      }
    })();
  </script>

  <!-- Alpine.js -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

</body>
</html>
