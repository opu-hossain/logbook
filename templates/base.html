{% load static %}
<!DOCTYPE html>
<html lang="en" class="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Logbook{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'css/output.css' %}">
  <link rel="alternate" type="application/rss+xml" title="Logbook RSS Feed" href="/feed/" />
  <style>[x-cloak] { display: none !important; }</style>
</head>

<body
  class="bg-gb-bg text-gb-text dark:bg-gb-dark-bg dark:text-gb-dark-text min-h-screen flex flex-col transition-colors duration-200"
  x-data
>

  {% include "partials/navbar.html" %}

    {% if messages %}
    {% for message in messages %}
    <div
      x-data="{ show: true }"
      x-init="setTimeout(() => show = false, 3000)"
      x-show="show"
      x-transition:enter="transition ease-out duration-300"
      x-transition:enter-start="opacity-0 translate-y-2"
      x-transition:enter-end="opacity-100 translate-y-0"
      x-transition:leave="transition ease-in duration-200"
      x-transition:leave-start="opacity-100"
      x-transition:leave-end="opacity-0"
      class="fixed bottom-6 right-6 z-50 px-4 py-3 rounded border text-sm font-medium shadow-lg
        {% if message.tags == 'success' %}border-gb-green text-gb-green bg-gb-surface dark:bg-gb-dark-surface
        {% elif message.tags == 'error' %}border-gb-red text-gb-red bg-gb-surface dark:bg-gb-dark-surface
        {% else %}border-gb-accent text-gb-accent bg-gb-surface dark:bg-gb-dark-surface{% endif %}"
    >
      {{ message }}
    </div>
    {% endfor %}
    {% endif %}


  <main class="mx-auto flex-1 w-full px-4 py-8 {% block main_class %}max-w-4xl{% endblock %}">
        {% block content %}{% endblock %}
  </main>

  {% include "partials/footer.html" %}

  <!-- Theme script: runs before paint to avoid flash -->
  <script>
    (function () {
      const saved = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (saved === 'dark' || (!saved && prefersDark)) {
        document.documentElement.classList.replace('light', 'dark');
      }
    })();
  </script>

  <!-- HTMX -->
  <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>

  <!-- Alpine.js -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <!-- Toast container -->
    <div id="toast-container" class="fixed bottom-6 right-6 z-50 flex flex-col gap-3" aria-live="polite"></div>
</body>
</html>
